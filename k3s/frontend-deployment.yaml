apiVersion: apps/v1
kind: Deployment
metadata:
  name: poproom-frontend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poproom-frontend
  template:
    metadata:
      labels:
        app: poproom-frontend
    spec:
      containers:
        - name: poproom-frontend
          image: jeanmichelbb/poproom-fe:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: poproom-frontend
  namespace: default
spec:
  selector:
    app: poproom-frontend
  ports:
    - port: 80
      targetPort: 80
